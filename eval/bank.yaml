# Ground-truth question bank. Scoring is execution-match: any SQL formulation
# that returns the same result set passes. match: ordered means the question
# itself demands an ordering; everything else compares row-order-insensitive.
# Canonical queries are validated against the loaded database in CI-adjacent
# checks; they are the answer key, so they stay boring on purpose.

- id: q01
  difficulty: easy
  question: >-
    How many of the group's open locations are in the borough of Manhattan?
    Return exactly one row with a single column: the number of locations as
    an integer. No other columns.
  match: unordered
  canonical_sql: |
    select count(*) from marts.dim_location where borough = 'Manhattan'

- id: q02
  difficulty: easy
  question: >-
    List the location names and neighborhoods of our Brooklyn restaurants.
    Return exactly two columns in this order: location_name and neighborhood,
    one row per Brooklyn location. No other columns.
  match: unordered
  canonical_sql: |
    select location_name, neighborhood
    from marts.dim_location
    where borough = 'Brooklyn'

- id: q03
  difficulty: easy
  question: >-
    What is the menu price of the Copperwick Smash Burger? Return exactly one
    row with a single column: the standard menu price in dollars as a number
    with 2 decimal places. Do not include the item name or any other columns.
  match: unordered
  canonical_sql: |
    select standard_price from marts.dim_menu_item
    where item_name = 'Copperwick Smash Burger'

- id: q04
  difficulty: easy
  question: >-
    How many menu items are in the Mains category? Return exactly one row with
    a single column: the number of items as an integer. No other columns.
  match: unordered
  canonical_sql: |
    select count(*) from marts.dim_menu_item where category = 'Mains'

- id: q05
  difficulty: easy
  question: >-
    What were total group net sales in calendar 2025 (business dates
    2025-01-01 through 2025-12-31), in dollars, computed from the POS ticket
    data rather than the GL feed? Return a single number. Do not round.
  match: unordered
  canonical_sql: |
    select sum(net_amount)
    from marts.fact_ticket_line
    where business_date between date '2025-01-01' and date '2025-12-31'

- id: q06
  difficulty: easy
  question: >-
    Which vendor supplies our coffee and tea? Return a single column,
    vendor_name, one row per matching vendor, and no other columns.
  match: unordered
  canonical_sql: |
    select vendor_name from marts.dim_vendor where vendor_category = 'coffee_tea'

- id: q07
  difficulty: easy
  question: >-
    Which menu items have no theoretical cost on their cost card? Return a
    single column, item_name, one row per item, and no other columns.
  match: unordered
  canonical_sql: |
    select item_name from marts.dim_menu_item where theoretical_unit_cost is null

- id: q08
  difficulty: medium
  question: >-
    Using the POS ticket lines as the source of truth (not the GL daily sales
    feed), show 2025 net sales by borough, highest first. 2025 means business
    dates 2025-01-01 through 2025-12-31. Net sales excludes voided and comped
    lines and counts refunds as negative. Return two columns, borough and net
    sales in dollars rounded to 2 decimals, one row per borough.
  match: ordered
  canonical_sql: |
    select l.borough, round(sum(f.net_amount), 2) as net_sales
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    where f.business_date between date '2025-01-01' and date '2025-12-31'
    group by l.borough
    order by net_sales desc

- id: q09
  difficulty: medium
  question: >-
    What was the average check (net sales per ticket) by location in 2025?
    Use business dates 2025-01-01 through 2025-12-31. Count every distinct
    ticket that appears in the POS lines for the window, including tickets
    whose only lines are voids, comps, or refunds. Report the store whose
    location code changed during 2025 as a single row under its current
    post-re-key code. Return exactly two columns: location_code and the
    average check in dollars rounded to 2 decimals, one row per location,
    nothing else.
  match: unordered
  canonical_sql: |
    select l.location_code,
           round(sum(f.net_amount) / count(distinct (f.business_date, f.ticket_number)), 2)
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    where f.business_date between date '2025-01-01' and date '2025-12-31'
    group by l.location_code

- id: q10
  difficulty: medium
  question: >-
    What were the five best-selling menu items by units across the group in
    2024 (business dates 2024-01-01 through 2024-12-31)? Count units as the
    total qty on POS ticket lines whose line_state is 'sale' (do not net
    refunds). Return exactly two columns in this order: item_name and total
    units, ordered by units descending, limited to 5 rows. No other columns.
    Do not round.
  match: ordered
  canonical_sql: |
    select m.item_name, sum(f.qty) as units
    from marts.fact_ticket_line f
    join marts.dim_menu_item m using (menu_item_id)
    where f.line_state = 'sale'
      and f.business_date between date '2024-01-01' and date '2024-12-31'
    group by m.item_name
    order by units desc
    limit 5

- id: q11
  difficulty: medium
  question: >-
    Show monthly net sales for Copperwick West Village (location_code 'CW-WV')
    across 2025. Return exactly two columns: the month as a first-of-month
    date (e.g. 2025-01-01) and total net sales in dollars, nothing else,
    ordered by month ascending. Do not round.
  match: ordered
  canonical_sql: |
    select date_trunc('month', f.business_date)::date as month, sum(f.net_amount)
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    where l.location_code = 'CW-WV'
      and f.business_date between date '2025-01-01' and date '2025-12-31'
    group by 1
    order by 1

- id: q12
  difficulty: medium
  question: >-
    What share of each location's 2025 tickets were delivery orders? Count a
    ticket as delivery if any of its lines has order_mode = 'DL'. Treat a
    store whose location_code changed during 2025 as a single location and
    report it under its most recent location_code. Count every 2025 ticket
    and every line regardless of line_state (voided and comped lines still
    count toward identifying delivery tickets and toward the ticket count).
    Return exactly two columns: location_code and the delivery share as a
    percentage of all 2025 tickets rounded to 1 decimal, one row per
    location, nothing else.
  match: unordered
  canonical_sql: |
    with t as (
      select f.location_id, f.business_date, f.ticket_number,
             bool_or(f.order_mode = 'DL') as is_delivery
      from marts.fact_ticket_line f
      where f.business_date between date '2025-01-01' and date '2025-12-31'
      group by 1, 2, 3
    )
    select l.location_code,
           round(100.0 * count(*) filter (where is_delivery) / count(*), 1)
    from t join marts.dim_location l using (location_id)
    group by l.location_code

- id: q13
  difficulty: medium
  question: >-
    How much comp (free food) value did each location give away in calendar
    2025? Comp value is the gross amount (qty times unit price) of ticket
    lines whose line_state is 'comp'. Attribute lines to calendar 2025 by
    business_date. Report each location under its current location_code; the
    store re-keyed mid-2025 is one location under its post-re-key code.
    Return exactly two columns, nothing else: location_code and the total
    comp value in dollars rounded to 2 decimals, one row per location.
  match: unordered
  canonical_sql: |
    select l.location_code, round(sum(f.gross_amount), 2)
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    where f.line_state = 'comp'
      and f.business_date between date '2025-01-01' and date '2025-12-31'
    group by l.location_code

- id: q14
  difficulty: medium
  question: >-
    Which five location-months overspent their labor budget by the most
    dollars during 2025? Return exactly three columns and nothing else:
    location_code, the month start date, and the overspend in dollars (actual
    labor wages minus labor budget) rounded to 2 decimals, ordered by
    overspend descending, limited to 5 rows. Consider only location-months
    that have a budget row; a newly opened location's first partial month has
    no budget and is out of scope.
  match: ordered
  canonical_sql: |
    with labor as (
      select location_id, date_trunc('month', business_date)::date as month_start,
             sum(wages) as labor_cost
      from marts.fact_labor_day
      where business_date between date '2025-01-01' and date '2025-12-31'
      group by 1, 2
    )
    select l.location_code, b.month_start,
           round(w.labor_cost - b.labor_budget, 2) as over_budget
    from labor w
    join marts.fact_budget_month b using (location_id, month_start)
    join marts.dim_location l using (location_id)
    order by over_budget desc
    limit 5

- id: q15
  difficulty: medium
  question: >-
    For each location, what share of 2025 net sales came on weekends?
    Attribute each ticket line to its business_date (the service date), not
    the closed_at timestamp. Return one row per location (9 rows); treat the
    re-keyed store as a single location across the full year and report its
    current post-re-key location_code. Return exactly two columns:
    location_code and the weekend share expressed as a percentage of that
    location's total 2025 net sales, rounded to 1 decimal place. No other
    columns.
  match: unordered
  canonical_sql: |
    select l.location_code,
           round(100.0 * sum(f.net_amount) filter (where d.is_weekend)
                 / sum(f.net_amount), 1)
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    join marts.dim_date d on d.date_key = f.business_date
    where f.business_date between date '2025-01-01' and date '2025-12-31'
    group by l.location_code

- id: q16
  difficulty: hard
  question: >-
    What were the top 3 menu items by units at every location in the fourth
    quarter of 2025 (business dates 2025-10-01 through 2025-12-31)? Consider
    every menu item in all categories, including beverages and bar items.
    Count units as the total qty on POS ticket lines recorded as sales;
    exclude voids, comps, and refunds (do not net refunds against sales).
    Rank items within each location by units descending,
    breaking ties alphabetically by item_name, and keep exactly the top 3 per
    location. Return exactly three columns in this order and nothing else:
    location_code, item_name, and units. Three rows per location. Do not
    round.
  match: unordered
  canonical_sql: |
    with ranked as (
      select l.location_code, m.item_name, sum(f.qty) as units,
             row_number() over (partition by l.location_code
                                order by sum(f.qty) desc, m.item_name) as rn
      from marts.fact_ticket_line f
      join marts.dim_location l using (location_id)
      join marts.dim_menu_item m using (menu_item_id)
      where f.line_state = 'sale'
        and f.business_date between date '2025-10-01' and date '2025-12-31'
      group by 1, 2
    )
    select location_code, item_name, units from ranked where rn <= 3

- id: q17
  difficulty: hard
  question: >-
    Show year-over-year net sales growth by location, 2025 versus 2024,
    computed from POS ticket lines (do not use the GL feed). Return exactly
    two columns: location_code (use the current post-re-key code, e.g. CW-GCX
    for the re-keyed store) and the growth percentage computed as
    100 * (2025 net sales / 2024 net sales - 1), rounded to 1 decimal place,
    NULL where 2024 net sales are zero or absent. One row per location, no
    other columns.
  match: unordered
  canonical_sql: |
    select l.location_code,
           round(100.0 * (sum(f.net_amount) filter (where f.business_date >= date '2025-01-01'
                                                      and f.business_date <= date '2025-12-31')
                          / nullif(sum(f.net_amount) filter (where f.business_date >= date '2024-01-01'
                                                               and f.business_date <= date '2024-12-31'), 0)
                          - 1), 1)
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    where f.business_date <= date '2025-12-31'
    group by l.location_code

- id: q18
  difficulty: hard
  question: >-
    On how many days in 2025 did each location's GL net sales differ from POS
    net sales (POS net sales = each location's daily net sales computed from
    the POS ticket lines, not the GL feed)? Use the current post-re-key
    location_code for the re-keyed store, aggregating both code eras into
    that one row. Return exactly two columns, location_code and the number of
    differing days as an integer, with one row for every location including
    locations with zero differing days.
  match: unordered
  canonical_sql: |
    with pos as (
      select location_id, business_date, sum(net_amount) as pos_net
      from marts.fact_ticket_line
      where business_date between date '2025-01-01' and date '2025-12-31'
      group by 1, 2
    )
    select l.location_code, count(*) filter (where g.gl_net_sales <> p.pos_net)
    from pos p
    join marts.fact_gl_day g using (location_id, business_date)
    join marts.dim_location l using (location_id)
    group by l.location_code

- id: q19
  difficulty: hard
  question: >-
    Rank locations by prime cost percentage for the twelve months ending June
    2026 (business/invoice dates 2025-07-01 through 2026-06-30), where prime
    cost percentage = 100 * (invoice purchase cost + labor wages) / POS net
    sales computed from ticket lines (do not use the GL sales feed). Report
    each location under its current location_code; if a location changed
    codes during the period covered by the data, use the latest code. Return
    exactly two columns: location_code and the percentage rounded to
    2 decimals, ordered from highest to lowest percentage, no other columns.
  match: ordered
  canonical_sql: |
    with net as (
      select location_id, sum(net_amount) as net_sales
      from marts.fact_ticket_line
      where business_date between date '2025-07-01' and date '2026-06-30'
      group by 1
    ),
    cogs as (
      select location_id, sum(ext_cost) as purchases
      from marts.fact_invoice_line
      where invoice_date between date '2025-07-01' and date '2026-06-30'
      group by 1
    ),
    labor as (
      select location_id, sum(wages) as labor_cost
      from marts.fact_labor_day
      where business_date between date '2025-07-01' and date '2026-06-30'
      group by 1
    )
    select l.location_code,
           round(100.0 * (c.purchases + w.labor_cost) / n.net_sales, 2) as prime_pct
    from net n
    join cogs c using (location_id)
    join labor w using (location_id)
    join marts.dim_location l using (location_id)
    order by prime_pct desc

- id: q20
  difficulty: hard
  question: >-
    For each location, what percentage of tickets included a non-alcoholic
    beverage in the first half of 2026 (business dates 2026-01-01 through
    2026-06-30)? Count only tickets that have at least one line with
    line_state = 'sale', and count a ticket as including a non-alcoholic
    beverage only when an 'NA Beverages' item appears on one of its sale
    lines. Return exactly two columns: location_code and the percentage
    (0 to 100) rounded to 1 decimal, nothing else.
  match: unordered
  canonical_sql: |
    with t as (
      select f.location_id, f.business_date, f.ticket_number,
             bool_or(m.category = 'NA Beverages' and f.line_state = 'sale') as has_na,
             bool_or(f.line_state = 'sale') as has_sale
      from marts.fact_ticket_line f
      join marts.dim_menu_item m using (menu_item_id)
      where f.business_date between date '2026-01-01' and date '2026-06-30'
      group by 1, 2, 3
    )
    select l.location_code,
           round(100.0 * count(*) filter (where has_na) / count(*), 1)
    from t join marts.dim_location l using (location_id)
    where has_sale
    group by l.location_code

- id: q21
  difficulty: hard
  question: >-
    Compare the Grand Central store's dinner share of net sales before and
    after its July 2025 format conversion (before = business dates prior to
    2025-07-01, after = 2025-07-01 onward; include both the CW-GC and CW-GCX
    eras). Return exactly two rows with two columns and nothing else: an era
    label that is the literal text 'before' or 'after', and dinner's
    percentage share of that era's net sales rounded to 1 decimal place. Use
    the dinner daypart as defined in the dayparts reference, inclusive of the
    full labeled end minute.
  match: unordered
  canonical_sql: |
    select case when f.business_date < date '2025-07-01' then 'before' else 'after' end as era,
           round(100.0 * sum(f.net_amount) filter (where f.daypart = 'dinner')
                 / sum(f.net_amount), 1)
    from marts.fact_ticket_line f
    join marts.dim_location l using (location_id)
    where l.location_code = 'CW-GCX'
    group by 1

- id: q22
  difficulty: hard
  question: >-
    How did the average listed selling price of the Kale Caesar change from
    May 2025 to July 2025? Define it as the average of the line-level
    unit_price across sale lines only, before any discounts. Return exactly
    two rows, one per month, with two columns and nothing else: the month as
    'YYYY-MM' text and the average unit_price rounded to 2 decimals.
  match: unordered
  canonical_sql: |
    select to_char(date_trunc('month', f.business_date), 'YYYY-MM') as month,
           round(avg(f.unit_price), 2)
    from marts.fact_ticket_line f
    join marts.dim_menu_item m using (menu_item_id)
    where m.item_name = 'Kale Caesar'
      and f.line_state = 'sale'
      and date_trunc('month', f.business_date) in (date '2025-05-01', date '2025-07-01')
    group by 1

- id: q23
  difficulty: hard
  question: >-
    What percentage of our total 2025 purchase spend (invoices dated
    2025-01-01 through 2025-12-31) went to each vendor? Return exactly two
    columns: vendor_name and the vendor's share of total 2025 ext_cost as a
    percentage rounded to 1 decimal place. Do not include dollar amounts or
    any other columns.
  match: unordered
  canonical_sql: |
    select v.vendor_name,
           round(100.0 * sum(i.ext_cost) / sum(sum(i.ext_cost)) over (), 1)
    from marts.fact_invoice_line i
    join marts.dim_vendor v using (vendor_id)
    where i.invoice_date between date '2025-01-01' and date '2025-12-31'
    group by v.vendor_name

- id: q24
  difficulty: hard
  question: >-
    By what percentage did the average unit cost of Ground Beef 80/20 rise
    from February 2025 to March 2025? Compute each month's average unit cost
    as the simple average of invoice-line unit costs using the filled unit
    cost (in marts this is the unit_cost_filled column). Assign each invoice
    line to a month by invoice_date. Return a single row with exactly one
    column: the percentage increase rounded to 1 decimal place. Do not
    include the monthly averages or any other columns.
  match: unordered
  canonical_sql: |
    with m as (
      select date_trunc('month', invoice_date)::date as month_start,
             avg(unit_cost_filled) as cost
      from marts.fact_invoice_line
      where item_desc = 'Ground Beef 80/20'
        and invoice_date between date '2025-02-01' and date '2025-03-31'
      group by 1
    )
    select round(100.0 * (max(cost) filter (where month_start = date '2025-03-01')
                          / max(cost) filter (where month_start = date '2025-02-01') - 1), 1)
    from m
