# Full pipeline proof on Linux: regenerate the dataset, load raw, dbt build
# (models + tests). Slower than dataset-determinism.yml, and worth it: this is
# the workflow that makes "the repo runs at clone time" a tested claim.
name: dbt build

on:
  push:
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-24.04
    env:
      PYTHONHASHSEED: "0"
      PGHOST: 127.0.0.1
      PGPORT: "5433"
      PGUSER: mua
      PGPASSWORD: mua_local_dev
      PGDATABASE: mua
      DBT_PROFILES_DIR: profiles
    services:
      postgres:
        image: postgres:16.14-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
        env:
          POSTGRES_USER: mua
          POSTGRES_PASSWORD: mua_local_dev
          POSTGRES_DB: mua
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version-file: .python-version

      - name: Install pinned dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dbt.txt

      - name: Regenerate dataset
        run: |
          python -m generator
          python -m generator --verify

      - name: Load raw layer
        run: python scripts/load.py

      - name: dbt deps
        run: dbt deps

      - name: dbt build (models + tests)
        run: dbt build

      - name: Eval answer-key guard
        run: |
          python -m pip install -r requirements-eval.txt
          python scripts/check_eval_bank.py

      - name: Calibration bands
        run: python -m generator.calibrate
