# dbt project: same three layers the plain-SQL phase built, now managed.
# Schema names are exact (staging / marts) via the generate_schema_name
# override, so the analysis/ queries did not change when dbt took over.
name: multi_unit_analytics
version: "1.0.0"
profile: multi_unit_analytics

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]   # analysis/ at repo root is plain psql, not dbt

models:
  multi_unit_analytics:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
